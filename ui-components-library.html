<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1f2937">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>UI Components Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
    <body class="dark bg-gray-900 min-h-screen">
        <!-- Navbar -->
        <nav class="bg-gray-800 shadow-lg sticky top-0 z-50 border-b border-gray-700">
            <div class="flex justify-between items-center h-16 px-4 sm:px-6">
                <div class="flex items-center space-x-2 sm:space-x-3 min-w-0 flex-1">
                    <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center flex-shrink-0">
                        <i class="fas fa-cube text-white"></i>
                    </div>
                    <h1 class="text-lg sm:text-xl md:text-2xl font-bold text-white truncate max-w-[150px] sm:max-w-[200px] md:max-w-none">UI Components Library</h1>
                </div>
                <div class="flex items-center space-x-2 sm:space-x-4">
                    <!-- Mobile Menu Toggle -->
                    <button id="mobile-menu-toggle" class="lg:hidden w-8 h-8 bg-gray-700 hover:bg-gray-600 rounded-lg flex items-center justify-center transition-colors" title="Toggle Menu">
                        <i class="fas fa-bars text-white"></i>
                    </button>
                    <button id="add-component-btn" class="w-8 h-8 bg-green-500 hover:bg-green-600 rounded-lg flex items-center justify-center transition-colors" title="Add New Component">
                        <i class="fas fa-plus text-white"></i>
                    </button>
                    <button id="export-btn" class="w-8 h-8 bg-purple-500 hover:bg-purple-600 rounded-lg flex items-center justify-center transition-colors" title="Export Components">
                        <i class="fas fa-download text-white"></i>
                    </button>
                    <button id="import-btn" class="w-8 h-8 bg-yellow-500 hover:bg-yellow-600 rounded-lg flex items-center justify-center transition-colors" title="Import Components">
                        <i class="fas fa-upload text-white"></i>
                    </button>
                    <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                        <i class="fas fa-code text-white"></i>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Layout -->
        <div class="flex h-screen pt-16">
            <!-- Mobile Menu Overlay -->
            <div id="mobile-menu-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden hidden"></div>
            
            <!-- Sidebar -->
            <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-gray-800 shadow-lg border-r border-gray-700 overflow-y-auto transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
                <div class="p-4 sm:p-6">
                    <div class="flex items-center justify-between mb-4 lg:hidden">
                        <h2 class="text-lg font-semibold text-white">Categories</h2>
                        <button id="close-sidebar" class="text-gray-400 hover:text-white">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                    <h2 class="text-lg font-semibold text-white mb-4 hidden lg:block">Categories</h2>
                    <div class="space-y-2">
                        <button class="category-btn w-full text-left px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 hover:text-blue-300 transition-colors active bg-blue-600 text-white font-medium text-sm sm:text-base" data-category="">All Components</button>
                        <button class="category-btn w-full text-left px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 hover:text-blue-300 transition-colors text-gray-100 font-medium text-sm sm:text-base" data-category="buttons">Buttons</button>
                        <button class="category-btn w-full text-left px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 hover:text-blue-300 transition-colors text-gray-100 font-medium text-sm sm:text-base" data-category="cards">Cards</button>
                        <button class="category-btn w-full text-left px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 hover:text-blue-300 transition-colors text-gray-100 font-medium text-sm sm:text-base" data-category="forms">Forms & Inputs</button>
                        <button class="category-btn w-full text-left px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 hover:text-blue-300 transition-colors text-gray-100 font-medium text-sm sm:text-base" data-category="navigation">Navigation</button>
                        <button class="category-btn w-full text-left px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 hover:text-blue-300 transition-colors text-gray-100 font-medium text-sm sm:text-base" data-category="loaders">Loaders & Indicators</button>
                        <button class="category-btn w-full text-left px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 hover:text-blue-300 transition-colors text-gray-100 font-medium text-sm sm:text-base" data-category="modals">Modals & Popups</button>
                        <button class="category-btn w-full text-left px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 hover:text-blue-300 transition-colors text-gray-100 font-medium text-sm sm:text-base" data-category="tables">Tables & Lists</button>
                        <button class="category-btn w-full text-left px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 hover:text-blue-300 transition-colors text-gray-100 font-medium text-sm sm:text-base" data-category="media">Media & Layout</button>
                        <button class="category-btn w-full text-left px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 hover:text-blue-300 transition-colors text-gray-100 font-medium text-sm sm:text-base" data-category="other">Other Components</button>
                        <button class="category-btn w-full text-left px-3 sm:px-4 py-2 rounded-lg hover:bg-gray-700 hover:text-blue-300 transition-colors text-gray-100 font-medium text-sm sm:text-base" data-category="futuristic">🚀 Futuristic</button>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 overflow-y-auto">
                <div class="p-4 sm:p-6 lg:p-8">
                    <!-- Header -->
                    <div class="mb-6 sm:mb-8">
                        <h2 class="text-2xl sm:text-3xl font-bold text-white mb-2 sm:mb-3">Component Library</h2>
                        <p class="text-base sm:text-lg text-gray-200 font-medium">Browse and copy ready-to-use UI components</p>
                        <div class="flex flex-col sm:flex-row sm:items-center sm:space-x-4 mt-2 text-sm text-gray-400 space-y-1 sm:space-y-0">
                            <span id="component-count">0 components</span>
                            <span id="filtered-count" class="hidden">0 filtered</span>
                        </div>
                    </div>

                    <!-- Search Bar -->
                    <div class="mb-6 sm:mb-8">
                        <div class="relative max-w-md">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-search text-gray-400"></i>
                            </div>
                            <input type="text" id="search-input" placeholder="Search components..." 
                                   class="w-full pl-10 pr-12 py-2 sm:py-3 border border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-gray-700 text-white placeholder-gray-400 text-sm sm:text-base">
                            <button id="clear-search" class="absolute inset-y-0 right-0 px-3 text-gray-400 hover:text-white transition-colors hidden">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <div class="mt-2 text-xs sm:text-sm text-gray-400">
                            <span>Search by name, description, or category</span>
                        </div>
                    </div>

                    <!-- Components Display -->
                    <div id="components-grid" class="space-y-6 sm:space-y-8">
                        <!-- Components will be dynamically added here -->
                    </div>
                </div>
            </main>
        </div>

        <!-- Add Component Modal -->
        <div id="add-component-modal" class="modal hidden">
            <div class="bg-black bg-opacity-50 flex items-center justify-center min-h-screen p-2 sm:p-4">
                <div class="component-form rounded-xl p-4 sm:p-6 lg:p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto mx-2">
                    <div class="flex justify-between items-center mb-4 sm:mb-6">
                        <h2 class="text-xl sm:text-2xl font-bold text-white">Add New Component</h2>
                        <button id="close-modal" class="text-gray-400 hover:text-white text-xl sm:text-2xl">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    
                    <form id="component-form" class="space-y-4 sm:space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-2">Component Name</label>
                                <input type="text" id="component-name" required class="w-full px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-300 mb-2">Category</label>
                                <select id="component-category" required class="w-full px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm sm:text-base">
                                    <option value="">Select Category</option>
                                    <option value="buttons">Buttons</option>
                                    <option value="cards">Cards</option>
                                    <option value="forms">Forms & Inputs</option>
                                    <option value="navigation">Navigation</option>
                                    <option value="loaders">Loaders & Indicators</option>
                                    <option value="modals">Modals & Popups</option>
                                    <option value="tables">Tables & Lists</option>
                                    <option value="media">Media & Layout</option>
                                    <option value="other">Other Components</option>
                                    <option value="futuristic">🚀 Futuristic</option>
                                </select>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">Description</label>
                            <textarea id="component-description" required rows="3" class="w-full px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Describe what this component does..."></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">HTML Code</label>
                            <textarea id="component-html" required rows="6" class="w-full px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm" placeholder="Your HTML code here..."></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-2">CSS Code</label>
                            <textarea id="component-css" required rows="6" class="w-full px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm" placeholder="Your CSS code here..."></textarea>
                        </div>
                        
                        <div class="flex justify-end space-x-3 pt-4">
                            <button type="button" id="cancel-btn" class="px-6 py-2 text-gray-300 hover:text-white transition-colors">Cancel</button>
                            <button type="submit" class="px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors">Add Component</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast">
            <span id="toast-message"></span>
        </div>

    <script>
        // Main JavaScript functionality
        class ComponentsLibrary {
            constructor() {
                this.components = [];
                this.filteredComponents = [];
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.loadComponents();
                this.renderComponents();
            }

            setupEventListeners() {
                // Add Component Modal
                const addBtn = document.getElementById('add-component-btn');
                const modal = document.getElementById('add-component-modal');
                const closeBtn = document.getElementById('close-modal');
                const cancelBtn = document.getElementById('cancel-btn');
                const form = document.getElementById('component-form');

                addBtn.addEventListener('click', () => {
                    modal.classList.remove('hidden');
                });

                closeBtn.addEventListener('click', () => {
                    modal.classList.add('hidden');
                    form.reset();
                });

                cancelBtn.addEventListener('click', () => {
                    modal.classList.add('hidden');
                    form.reset();
                });

                // Close modal when clicking outside
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.add('hidden');
                        form.reset();
                    }
                });

                // Handle form submission
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addNewComponent();
                });

                // Export/Import functionality
                const exportBtn = document.getElementById('export-btn');
                const importBtn = document.getElementById('import-btn');

                exportBtn.addEventListener('click', () => {
                    this.exportComponents();
                });

                importBtn.addEventListener('click', () => {
                    this.importComponents();
                });

                // Debounced search for better performance
                let searchTimeout;
                const searchInput = document.getElementById('search-input');
                const clearSearchBtn = document.getElementById('clear-search');
                
                searchInput.addEventListener('input', (e) => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => this.filterComponents(), 300);
                    
                    // Show/hide clear button
                    if (e.target.value.length > 0) {
                        clearSearchBtn.classList.remove('hidden');
                    } else {
                        clearSearchBtn.classList.add('hidden');
                    }
                });
                
                clearSearchBtn.addEventListener('click', () => {
                    searchInput.value = '';
                    this.filterComponents();
                    clearSearchBtn.classList.add('hidden');
                });
                
                // Sidebar category navigation
                document.querySelectorAll('.category-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        // Remove active state from all buttons
                        document.querySelectorAll('.category-btn').forEach(b => {
                            b.classList.remove('bg-blue-600', 'text-white', 'active');
                        });
                        // Add active state to clicked button
                        e.target.classList.add('bg-blue-600', 'text-white', 'active');
                        
                        const category = e.target.dataset.category;
                        this.filterByCategory(category);
                    });
                });
            }

            filterByCategory(category) {
                if (!category) {
                    this.filteredComponents = [...this.components];
                } else {
                    this.filteredComponents = this.components.filter(component => component.category === category);
                }
                this.renderComponents();
            }

            filterComponents() {
                const searchTerm = document.getElementById('search-input').value.toLowerCase();
                const activeCategory = document.querySelector('.category-btn.active')?.dataset.category;
                
                this.filteredComponents = this.components.filter(component => {
                    const matchesSearch = component.name.toLowerCase().includes(searchTerm) || 
                                        component.description.toLowerCase().includes(searchTerm);
                    const matchesCategory = !activeCategory || component.category === activeCategory;
                    return matchesSearch && matchesCategory;
                });
                
                this.renderComponents();
            }

            addNewComponent() {
                const name = document.getElementById('component-name').value.trim();
                const category = document.getElementById('component-category').value;
                const description = document.getElementById('component-description').value.trim();
                const html = document.getElementById('component-html').value.trim();
                const css = document.getElementById('component-css').value.trim();

                if (!name || !category || !description || !html || !css) {
                    this.showToast('Please fill in all fields', 'error');
                    return;
                }

                // Validate HTML and CSS syntax
                try {
                    // Basic HTML validation
                    if (!html.includes('<') || !html.includes('>')) {
                        throw new Error('Invalid HTML format');
                    }

                    // Create new component
                    const newComponent = {
                        name,
                        description,
                        category,
                        html,
                        css: `/* ${name} Styles */\n${css}`
                    };

                    // Add to components array
                    this.components.unshift(newComponent);
                    this.filteredComponents.unshift(newComponent);

                    // Update display
                    this.renderComponents();

                    // Close modal and reset form
                    document.getElementById('add-component-modal').classList.add('hidden');
                    document.getElementById('component-form').reset();

                    // Show success message
                    this.showToast('Component added successfully!', 'success');

                    // Switch to the new component's category
                    this.filterByCategory(category);

                } catch (error) {
                    this.showToast(`Validation error: ${error.message}`, 'error');
                }
            }

            showToast(message, type = 'success') {
                const toast = document.getElementById('toast');
                const toastMessage = document.getElementById('toast-message');
                
                toastMessage.textContent = message;
                toast.className = `toast ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }

            exportComponents() {
                try {
                    const dataStr = JSON.stringify(this.components, null, 2);
                    const dataBlob = new Blob([dataStr], { type: 'application/json' });
                    const url = URL.createObjectURL(dataBlob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = 'ui-components-library.json';
                    link.click();
                    URL.revokeObjectURL(url);
                    this.showToast('Components exported successfully!', 'success');
                } catch (error) {
                    this.showToast('Failed to export components', 'error');
                }
            }

            importComponents() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            try {
                                const importedComponents = JSON.parse(e.target.result);
                                if (Array.isArray(importedComponents)) {
                                    // Validate imported components
                                    const validComponents = importedComponents.filter(comp => 
                                        comp.name && comp.description && comp.category && comp.html && comp.css
                                    );
                                    
                                    if (validComponents.length > 0) {
                                        this.components = [...this.components, ...validComponents];
                                        this.filteredComponents = [...this.components];
                                        this.renderComponents();
                                        this.showToast(`Imported ${validComponents.length} components successfully!`, 'success');
                                    } else {
                                        this.showToast('No valid components found in file', 'error');
                                    }
                                } else {
                                    this.showToast('Invalid file format', 'error');
                                }
                            } catch (error) {
                                this.showToast('Failed to parse imported file', 'error');
                            }
                        };
                        reader.readAsText(file);
                    }
                };
                input.click();
            }

            copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(() => {
                    this.showToast('Code copied to clipboard!', 'success');
                }).catch(() => {
                    this.showToast('Failed to copy code', 'error');
                });
            }

            loadComponents() {
                // Button Components
                this.components = [
                    {
                        name: "Primary Button",
                        description: "A solid primary button with hover effects",
                        category: "buttons",
                        html: '<button class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200 shadow-md hover:shadow-lg">Primary Button</button>',
                        css: '/* Primary Button Styles */\n.bg-blue-500 { background-color: #3b82f6; }\n.hover\\:bg-blue-600:hover { background-color: #2563eb; }\n.transition-colors { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; }\n.duration-200 { transition-duration: 200ms; }'
                    },
                    {
                        name: "Secondary Button",
                        description: "A secondary button with outline style",
                        category: "buttons",
                        html: '<button class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded-lg transition-colors duration-200 border border-gray-300">Secondary Button</button>',
                        css: '/* Secondary Button Styles */\n.bg-gray-200 { background-color: #e5e7eb; }\n.hover\\:bg-gray-300:hover { background-color: #d1d5db; }\n.border-gray-300 { border-color: #d1d5db; }'
                    },
                    {
                        name: "Outline Button",
                        description: "A transparent button with colored border",
                        category: "buttons",
                        html: '<button class="bg-transparent hover:bg-blue-50 text-blue-600 font-medium py-2 px-4 rounded-lg transition-colors duration-200 border-2 border-blue-500 hover:border-blue-600">Outline Button</button>',
                        css: '/* Outline Button Styles */\n.bg-transparent { background-color: transparent; }\n.hover\\:bg-blue-50:hover { background-color: #eff6ff; }\n.border-2 { border-width: 2px; }\n.border-blue-500 { border-color: #3b82f6; }'
                    },
                    {
                        name: "Gradient Button",
                        description: "A beautiful gradient button with modern design",
                        category: "buttons",
                        html: '<button class="bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-medium py-2 px-4 rounded-lg transition-all duration-200 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">Gradient Button</button>',
                        css: '/* Gradient Button Styles */\n.bg-gradient-to-r { background-image: linear-gradient(to right, var(--tw-gradient-stops)); }\n.from-purple-500 { --tw-gradient-from: #8b5cf6; }\n.to-pink-500 { --tw-gradient-to: #ec4899; }\n.transform { transform: translate(var(--tw-translate-x), var(--tw-translate-y)) rotate(var(--tw-rotate)) skewX(var(--tw-skew-x)) skewY(var(--tw-skew-y)) scaleX(var(--tw-scale-x)) scaleY(var(--tw-scale-y)); }\n.hover\\:-translate-y-0\\.5:hover { --tw-translate-y: -0.125rem; }'
                    },
                    {
                        name: "Icon Button",
                        description: "A button with an icon and text",
                        category: "buttons",
                        html: '<button class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200 flex items-center space-x-2"><i class="fas fa-download"></i><span>Download</span></button>',
                        css: '/* Icon Button Styles */\n.flex { display: flex; }\n.items-center { align-items: center; }\n.space-x-2 > * + * { margin-left: 0.5rem; }'
                    },
                    {
                        name: "Toggle Button",
                        description: "An interactive toggle button with state",
                        category: "buttons",
                        html: '<button class="toggle-btn relative inline-flex h-6 w-11 items-center rounded-full bg-gray-200 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" onclick="this.classList.toggle(\'bg-blue-500\')"><span class="toggle-thumb inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 translate-x-1"></span></button>',
                        css: '/* Toggle Button Styles */\n.toggle-btn.bg-blue-500 .toggle-thumb { transform: translateX(1.25rem); }\n.focus\\:ring-2:focus { --tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color); }\n.focus\\:ring-blue-500:focus { --tw-ring-color: #3b82f6; }'
                    },
                    {
                        name: "Floating Action Button",
                        description: "A floating action button for primary actions",
                        category: "buttons",
                        html: '<button class="fab fixed bottom-6 right-6 bg-blue-500 hover:bg-blue-600 text-white rounded-full w-14 h-14 shadow-lg hover:shadow-xl transition-all duration-200 transform hover:scale-110 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"><i class="fas fa-plus text-xl"></i></button>',
                        css: '/* FAB Styles */\n.fab { position: fixed; bottom: 1.5rem; right: 1.5rem; }\n.w-14 { width: 3.5rem; }\n.h-14 { height: 3.5rem; }\n.hover\\:scale-110:hover { transform: scale(1.1); }'
                    },
                    // Card Components
                    {
                        name: "Simple Card",
                        description: "A clean and simple card component",

                    }
                    
                    /* Ensure all text is visible */
                    .component-demo-wrapper .text-center,
                    .component-demo-wrapper .text-white,
                    .component-demo-wrapper .text-cyan-400,
                    .component-demo-wrapper .text-lg,
                    .component-demo-wrapper .text-2xl,
                    .component-demo-wrapper .text-sm {
                        color: #ffffff !important;
                        text-shadow: 0 0 4px rgba(0, 0, 0, 0.8) !important;
                        position: relative !important;
                        z-index: 10 !important;
                    }
                    
                    /* Component CSS */
                    ${component.css}
                `;
                document.head.appendChild(style);
                
                // Store style reference for cleanup
                demoOverlay.dataset.styleId = style.id || 'demo-style-' + Date.now();
                style.id = demoOverlay.dataset.styleId;
                
                // Add interactive functionality based on component type
                if (component.category === 'buttons') {
                    const buttons = componentWrapper.querySelectorAll('button');
                    buttons.forEach(btn => {
                        btn.addEventListener('click', () => {
                            // Add visual feedback
                            btn.style.transform = 'scale(0.95)';
                            setTimeout(() => {
                                btn.style.transform = 'scale(1)';
                            }, 150);
                            
                            // Add visual feedback only (no toast messages)
                            const btnText = btn.textContent.toLowerCase();
                            // Visual feedback is handled by the scale transform above
                        });
                    });
                }
                
                if (component.category === 'forms') {
                    const forms = componentWrapper.querySelectorAll('form');
                    const inputs = componentWrapper.querySelectorAll('input, textarea, select');
                    
                    // Add form validation feedback
                    inputs.forEach(input => {
                        input.addEventListener('focus', () => {
                            input.style.borderColor = '#3b82f6';
                            input.style.boxShadow = '0 0 0 3px rgba(59, 130, 246, 0.1)';
                        });
                        
                        input.addEventListener('blur', () => {
                            input.style.borderColor = '';
                            input.style.boxShadow = '';
                        });
                    });
                    
                    forms.forEach(form => {
                        form.addEventListener('submit', (e) => {
                            e.preventDefault();
                            
                            // Simulate form processing
                            const submitBtn = form.querySelector('button[type="submit"]');
                            if (submitBtn) {
                                const originalText = submitBtn.textContent;
                                submitBtn.textContent = 'Processing...';
                                submitBtn.disabled = true;
                                
                                setTimeout(() => {
                                    submitBtn.textContent = originalText;
                                    submitBtn.disabled = false;
                                    // Form submission feedback handled visually
                                }, 1500);
                            }
                        });
                    });
                }
                
                if (component.category === 'cards') {
                    const cards = componentWrapper.querySelectorAll('.card, [class*="card"]');
                    cards.forEach(card => {
                        card.addEventListener('click', () => {
                            card.style.transform = 'translateY(-2px)';
                            card.style.boxShadow = '0 10px 25px rgba(0, 0, 0, 0.3)';
                            setTimeout(() => {
                                card.style.transform = '';
                                card.style.boxShadow = '';
                            }, 300);
                            // Card selection feedback handled visually
                        });
                    });
                }
                
                if (component.category === 'navigation') {
                    const navItems = componentWrapper.querySelectorAll('nav a, .nav-link, [class*="nav"] a');
                    navItems.forEach(item => {
                        item.addEventListener('click', (e) => {
                            e.preventDefault();
                            item.style.color = '#3b82f6';
                            setTimeout(() => {
                                item.style.color = '';
                            }, 500);
                            // Navigation feedback handled visually
                        });
                    });
                }
                
                if (component.category === 'modals') {
                    const modalTriggers = componentWrapper.querySelectorAll('[data-modal], .modal-trigger, button[onclick*="modal"]');
                    modalTriggers.forEach(trigger => {
                        trigger.addEventListener('click', (e) => {
                            e.preventDefault();
                            // Modal trigger feedback handled visually
                        });
                    });
                }
                
                if (component.category === 'tables') {
                    const tableRows = componentWrapper.querySelectorAll('tr');
                    tableRows.forEach(row => {
                        row.addEventListener('click', () => {
                            row.style.backgroundColor = 'rgba(59, 130, 246, 0.1)';
                            setTimeout(() => {
                                row.style.backgroundColor = '';
                            }, 1000);
                            // Row selection feedback handled visually
                        });
                    });
                }
                
                if (component.category === 'loaders') {
                    const loaders = componentWrapper.querySelectorAll('.loader, .spinner, [class*="loading"]');
                    loaders.forEach(loader => {
                        // Simulate loading states
                        if (loader.classList.contains('loading') || loader.classList.contains('spinner')) {
                            setTimeout(() => {
                                loader.style.opacity = '0.3';
                                setTimeout(() => {
                                    loader.style.opacity = '1';
                                }, 1000);
                            }, 2000);
                        }
                    });
                }
                
                if (component.category === 'futuristic') {
                    // Neural Network Node interactions
                    const neuralNodes = componentWrapper.querySelectorAll('.neural-node');
                    neuralNodes.forEach(node => {
                        node.addEventListener('click', () => {
                            node.style.transform = 'scale(1.2) rotate(180deg)';
                            setTimeout(() => {
                                node.style.transform = 'scale(1) rotate(0deg)';
                            }, 600);
                            // Neural node activation feedback handled visually
                        });
                    });
                    
                    // Holographic Card interactions
                    const holographicCards = componentWrapper.querySelectorAll('.holographic-card');
                    holographicCards.forEach(card => {
                        card.addEventListener('mouseenter', () => {
                            card.style.transform = 'scale(1.05) rotateY(3deg)';
                        });
                        card.addEventListener('mouseleave', () => {
                            card.style.transform = 'scale(1) rotateY(0deg)';
                        });
                    });
                    
                    // Quantum Toggle interactions
                    const quantumToggles = componentWrapper.querySelectorAll('.quantum-toggle');
                    quantumToggles.forEach(toggle => {
                        toggle.addEventListener('click', () => {
                            // Quantum toggle feedback handled visually
                        });
                    });
                    
                    // Data Stream interactions
                    const dataStreams = componentWrapper.querySelectorAll('.data-stream');
                    dataStreams.forEach(stream => {
                        stream.addEventListener('click', () => {
                            const particles = stream.querySelectorAll('.particle');
                            particles.forEach(particle => {
                                particle.style.animationDuration = '0.5s';
                                setTimeout(() => {
                                    particle.style.animationDuration = '';
                                }, 1000);
                            });
                            // Data stream enhancement feedback handled visually
                        });
                    });
                    
                    // AI Chat interactions
                    const aiChats = componentWrapper.querySelectorAll('.ai-chat');
                    aiChats.forEach(chat => {
                        const input = chat.querySelector('input');
                        const sendBtn = chat.querySelector('button');
                        if (input && sendBtn) {
                            sendBtn.addEventListener('click', () => {
                                if (input.value.trim()) {
                                    // AI message feedback handled visually
                                    input.value = '';
                                }
                            });
                        }
                    });
                    
                    // Holographic Button interactions
                    const holographicBtns = componentWrapper.querySelectorAll('.holographic-btn');
                    holographicBtns.forEach(btn => {
                        btn.addEventListener('click', () => {
                            btn.style.transform = 'scale(0.95)';
                            setTimeout(() => {
                                btn.style.transform = 'scale(1)';
                            }, 150);
                            // Holographic system feedback handled visually
                        });
                    });
                    
                    // Particle System interactions
                    const particleSystems = componentWrapper.querySelectorAll('.particle-system');
                    particleSystems.forEach(system => {
                        system.addEventListener('click', () => {
                            // Particle system feedback handled visually
                        });
                    });
                }
                
                // Add cleanup when demo is closed
                const cleanup = () => {
                    // Remove the style element
                    const styleElement = document.getElementById(demoOverlay.dataset.styleId);
                    if (styleElement) {
                        styleElement.remove();
                    }
                };
                
                // Store cleanup function reference
                demoOverlay.dataset.cleanup = cleanup;
                
                // Override the close functionality to include cleanup
                const originalClose = demoOverlay.querySelector('.close-demo').onclick;
                demoOverlay.querySelector('.close-demo').onclick = () => {
                    cleanup();
                    document.body.removeChild(demoOverlay);
                };
                
                                // Also cleanup on overlay click
                const originalOverlayClick = demoOverlay.onclick;
                demoOverlay.onclick = (e) => {
                    if (e.target === demoOverlay) {
                        cleanup();
                        document.body.removeChild(demoOverlay);
                    }
                };
            }
        }

        // Initialize the library when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            window.componentsLibrary = new ComponentsLibrary();
            
            // Mobile menu functionality
            const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');
            const closeSidebar = document.getElementById('close-sidebar');
            
            // Open mobile menu
            mobileMenuToggle.addEventListener('click', () => {
                sidebar.classList.remove('-translate-x-full');
                mobileMenuOverlay.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            });
            
            // Close mobile menu
            const closeMobileMenu = () => {
                sidebar.classList.add('-translate-x-full');
                mobileMenuOverlay.classList.add('hidden');
                document.body.style.overflow = '';
            };
            
            closeSidebar.addEventListener('click', closeMobileMenu);
            mobileMenuOverlay.addEventListener('click', closeMobileMenu);
            
            // Close menu on category button click (mobile)
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (window.innerWidth < 1024) { // lg breakpoint
                        closeMobileMenu();
                    }
                });
            });
            
            // Handle window resize
            window.addEventListener('resize', () => {
                if (window.innerWidth >= 1024) {
                    closeMobileMenu();
                }
            });
            
            // Touch gestures for mobile
            let touchStartX = 0;
            let touchEndX = 0;
            
            sidebar.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            });
            
            sidebar.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            });
            
            function handleSwipe() {
                const swipeThreshold = 50;
                const diff = touchStartX - touchEndX;
                
                if (Math.abs(diff) > swipeThreshold) {
                    if (diff > 0) { // Swipe left
                        closeMobileMenu();
                    }
                }
            }
        });
    </script>
</body>
</html>
